<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#141414">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMG">
<title>Amyotte Mechanical Group — Command Center</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/amg_icon.png">
<style>
:root{
  --bg:#141414; --bg2:#1a1b1e; --panel:#1f2125; --panel2:#26282d; --line:#33363c;
  --txt:#e8eaed; --muted:#9aa0a6; --muted2:#71767d;
  --blue:#3DA0D7; --blue-d:#2d7eac; --orange:#E8772E; --orange-d:#c25f1f;
  --gold:#C9A14A; --green:#3FB950; --red:#E5534B; --warn:#D9943A;
  --accent:var(--blue); --accent-d:var(--blue-d);
  --radius:14px; --shadow:0 6px 22px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(900px 500px at 80% -10%, rgba(232,119,46,.06), transparent),
    radial-gradient(900px 500px at -10% 110%, rgba(61,160,215,.07), transparent),
    var(--bg);
  color:var(--txt); -webkit-font-smoothing:antialiased; overscroll-behavior:none;
}
body[data-brand="SUS"]{--accent:var(--orange);--accent-d:var(--orange-d)}
body[data-brand="APH"]{--accent:var(--blue);--accent-d:var(--blue-d)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--accent)}
.hidden{display:none!important}

/* ---------- Sign-in ---------- */
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(700px 400px at 50% 0%, rgba(61,160,215,.10), transparent), var(--bg);z-index:50}
.auth-card{width:100%;max-width:380px;text-align:center}
.auth-card img.logo{width:100%;max-width:330px;margin:0 auto 18px;display:block;filter:drop-shadow(0 6px 16px rgba(0,0,0,.5))}
.auth-card h1{font-size:18px;margin:6px 0 2px;letter-spacing:.5px}
.auth-card p{color:var(--muted);font-size:13px;margin:0 0 20px}
.field{text-align:left;margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;color:var(--txt);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:10px;
  background:var(--accent);color:#fff;font-weight:700;font-size:15px;width:100%;transition:filter .15s}
.btn:active{filter:brightness(.9)}
.btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
.btn.sm{width:auto;padding:8px 14px;font-size:13px}
.btn.danger{background:var(--red)}
.err{color:var(--red);font-size:13px;min-height:18px;margin-top:4px}
.pin-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.pin-user{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;text-align:left}
.pin-user:active{border-color:var(--accent)}
.pin-user .av{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;
  justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
.pin-user .nm{font-weight:600}.pin-user .rl{font-size:12px;color:var(--muted)}

/* ---------- App shell ---------- */
#app{display:none;flex-direction:column;min-height:100vh;padding-bottom:78px}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(20,20,20,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar .brandmark{height:30px}
.topbar .brandword{font-weight:800;font-size:14px;letter-spacing:.2px;white-space:nowrap}
.topbar .brandword small{font-weight:600;color:var(--muted);font-size:11px}
.topbar .spacer{flex:1}
.brand-toggle{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
.brand-toggle button{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;color:var(--muted)}
.brand-toggle button.on{color:#fff}
.brand-toggle button.on[data-b="APH"]{background:var(--blue)}
.brand-toggle button.on[data-b="SUS"]{background:var(--orange)}
.brand-toggle button.on[data-b="ALL"]{background:var(--panel2);color:var(--txt)}
.iconbtn{width:38px;height:38px;border-radius:10px;background:var(--panel);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:16px}
.content{padding:16px 14px;max-width:1100px;margin:0 auto;width:100%}
.page-title{font-size:22px;font-weight:800;margin:2px 0 2px}
.page-sub{color:var(--muted);font-size:13px;margin:0 0 16px}

/* ---------- Bottom nav ---------- */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;background:rgba(20,20,20,.92);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:6px 4px env(safe-area-inset-bottom)}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;color:var(--muted2);font-size:10px;font-weight:600}
.nav button .ic{font-size:19px;line-height:1}
.nav button.on{color:var(--accent)}

/* ---------- Cards / grid ---------- */
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:700px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.kpi{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.kpi .val{font-size:26px;font-weight:800;margin-top:4px}
.kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
.kpi .val.accent{color:var(--accent)}
.section-h{display:flex;align-items:center;gap:10px;margin:22px 0 12px}
.section-h h2{font-size:16px;margin:0;font-weight:800}
.section-h .spacer{flex:1}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.chip.aph{background:rgba(61,160,215,.14);color:#7cc4ea;border-color:rgba(61,160,215,.3)}
.chip.sus{background:rgba(232,119,46,.14);color:#f0a06a;border-color:rgba(232,119,46,.3)}
.chip.emerg{background:rgba(229,83,75,.16);color:#f08a83;border-color:rgba(229,83,75,.35)}
.chip.high{background:rgba(217,148,58,.16);color:#e6b46e;border-color:rgba(217,148,58,.35)}

/* board */
.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.col{flex:0 0 230px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:120px}
.col h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:2px 4px 10px;display:flex;justify-content:space-between}
.col h3 .ct{background:var(--panel2);border-radius:999px;padding:1px 8px;color:var(--txt)}
.lead-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px}
.lead-card:active{border-color:var(--accent)}
.lead-card .nm{font-weight:700;font-size:14px}
.lead-card .meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.lead-card .val{font-weight:800;color:var(--green)}
.row{display:flex;align-items:center;gap:10px}
.list-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.list-item:active{border-color:var(--accent)}
.list-item .main{flex:1;min-width:0}
.list-item .main .t{font-weight:700}
.list-item .main .s{font-size:12px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:6px}
.list-item .rt{text-align:right;font-size:12px;color:var(--muted);flex-shrink:0}
.stars{color:var(--gold);letter-spacing:1px}
.empty{text-align:center;color:var(--muted2);padding:34px 16px;font-size:14px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar select,.toolbar input{padding:9px 12px;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--txt);font-size:13px}
.tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--line);overflow-x:auto}
.tabs button{padding:10px 14px;font-size:13px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap}
.tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
.fab{position:fixed;right:18px;bottom:90px;z-index:25;width:56px;height:56px;border-radius:50%;background:var(--accent);
  color:#fff;font-size:28px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:600px){.modal-bg{align-items:center;padding:20px}}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:520px;
  max-height:92vh;overflow-y:auto;padding:18px 16px 26px}
@media(min-width:600px){.modal{border-radius:18px}}
.modal h2{margin:2px 0 14px;font-size:18px}
.modal .field{margin-bottom:12px}
.modal-actions{display:flex;gap:10px;margin-top:8px}
.modal-actions .btn{flex:1}
.grab{width:40px;height:4px;background:var(--line);border-radius:999px;margin:0 auto 14px}
.ai-box{background:var(--bg2);border:1px dashed var(--accent);border-radius:10px;padding:12px;font-size:14px;white-space:pre-wrap;margin-top:8px;line-height:1.45}
.note{font-size:12px;color:var(--muted)}
.banner{background:linear-gradient(110deg,rgba(61,160,215,.12),rgba(232,119,46,.12));border:1px solid var(--line);
  border-radius:var(--radius);padding:14px;display:flex;gap:14px;align-items:center;margin-bottom:16px}
.banner video{width:120px;border-radius:10px;background:#000}
.banner .bt{font-weight:800}.banner .bs{font-size:12px;color:var(--muted)}
.progress{height:7px;background:var(--panel2);border-radius:999px;overflow:hidden;margin-top:8px}
.progress > i{display:block;height:100%;background:var(--accent);border-radius:999px}
.flag-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);
  color:var(--txt);padding:11px 18px;border-radius:999px;z-index:80;font-size:13px;box-shadow:var(--shadow);opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.linkrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.linkrow a{font-size:12px;background:var(--panel2);border:1px solid var(--line);padding:6px 10px;border-radius:8px;text-decoration:none;color:var(--txt)}
/* Print: clean Trust Shield (and any page) for screenshots/website */
@media print{
  body{background:#fff;color:#111}
  .topbar,.nav,.fab,.tabs,.toolbar,.page-sub{display:none!important}
  #app{padding:0}
  .card{border:1px solid #ccc;break-inside:avoid}
  .chip.aph{background:#e8f3fb;color:#15618f}
  .note{color:#444}
  .print-hide{display:none!important}
}
</style>
</head>
<body data-brand="ALL">

<!-- ===================== SIGN IN ===================== -->
<div id="auth">
  <div class="auth-card">
    <img class="logo" src="assets/amg_logo.png" alt="Amyotte Mechanical Group" onerror="this.style.display='none'">
    <div id="authBody"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="topbar">
    <img class="brandmark" src="assets/amg_icon.png" alt="AMG" onerror="this.style.display='none'">
    <span class="brandword" id="brandWord"></span>
    <div class="brand-toggle" id="brandToggle">
      <button data-b="ALL" onclick="setBrand('ALL')">All</button>
      <button data-b="APH" onclick="setBrand('APH')">Plumbing</button>
      <button data-b="SUS" onclick="setBrand('SUS')">Suck-U-Sump</button>

</div>

<!-- bottom nav -->
<div class="nav" id="nav" style="display:none">
  <button data-p="dashboard" onclick="go('dashboard')"><span class="ic">📊</span>Dashboard</button>
  <button data-p="leads" onclick="go('leads')"><span class="ic">🎯</span>Leads</button>
  <button data-p="schedule" onclick="go('schedule')"><span class="ic">🗓️</span>Schedule</button>
  <button data-p="customers" onclick="go('customers')"><span class="ic">⭐</span>Customers</button>
  <button data-p="more" onclick="go('more')"><span class="ic">⋯</span>More</button>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* =========================================================
   Amyotte Mechanical Group — Command Center
   Single-file PWA. localStorage primary. Templates-first AI.
   ========================================================= */
const APP_VERSION = "v6.0";
const STORE_KEY = "amg_cc_state_v1";

/* ---- option lists ---- */
const CITIES = ["Edmonton","Sherwood Park","Beaumont","St. Albert","Leduc","Fort Saskatchewan","Spruce Grove","Other"];
const SERVICE_TYPES = ["Emergency plumbing","HVAC / furnace","Hot water tank","Boiler","Bathroom reno","Grease trap","Sump / catch basin","Septic","Line steaming","Backflow","Video inspection","Other"];
const SOURCES = ["Phone","Website form","Web chat","Google LSA","Facebook","Instagram","Referral","Cross-dispatch","Repeat customer"];
const LEAD_STAGES = ["New","Contacted","Qualified","Quoted","Booked","Won","Lost"];
const DEV_STAGES = ["Identified","Researching","Contacted","Site visit","Bid submitted","Won","Lost"];
const DEV_TYPES = ["New residential build","Commercial new-build","Multi-family / high-rise","Retail / mall","Industrial","Reno / tenant build-out"];
const DEV_SOURCES = ["Permit data","Referral","LinkedIn","Drive-by","Existing client","Other"];
const CUST_TYPES = ["Residential","Commercial","Property Mgmt","Restaurant / QSR","Industrial"];
const RELATIONSHIPS = ["New","Repeat","VIP","At-risk"];
const REVIEW_PLATFORMS = ["Google","Facebook","BBB"];
const REP_PLATFORMS = ["Google","BBB","YellowPages","Facebook"];
const REP_FLAGS = ["Needs response","Responded","Resolved","Watch"];
const PRIORITIES = ["Emergency","High","Normal"];
const JOB_STATUS = ["Scheduled","Dispatched","In progress","Complete"];
const PAID_STATUS = ["N/A","Unpaid","Paid"];
const PART_LOC = ["Warehouse","Van"];
const PART_BRAND = ["APH","SUS","Shared"];
const STAFF_ROLES = ["Journeyman Plumber","Registered Apprentice","HVAC Specialist","Gasfitter Class A","Gasfitter Class B","Vac Truck Operator","Office / Dispatch","Owner"];
const CERT_TYPES = ["Journeyman Plumber","Registered Apprentice","HVAC Specialist","Gasfitter Class A","Gasfitter Class B","Backflow Tester","Other"];
const CONTRACT_TIERS = ["Quarterly","Bi-Annual","Annual","Monthly"];
const CONTRACT_SERVICES = ["Grease trap","Sump / catch basin","Line steaming","Septic","Bundled mechanical"];
const CONTRACT_STATUS = ["Prospect","Pending","Active","Expired"];
const FREQ_DAYS = {Monthly:30,Quarterly:91,"Bi-Annual":182,Annual:365};

/* ---- fresh state ---- */
const FRESH_STATE = {
  me:{name:"",role:"",master:false},
  accounts:{},                 // name -> {salt,hash,role,master}
  masterUser:"Cory Amyotte",
  signInLog:[],
  brand:"ALL",
  leads:[], customers:[], reviewRequests:[], reputation:[], developments:[],
  jobs:[], inventory:[], staff:[], contracts:[],
  presenceScore:{ googleAPH:"", googleSUS:"", volMonth:"", igFollowers:"" },
  finance:{ monthRevenue:"", monthTarget:"", avgJobValue:"", monthExpenses:"" },
  apiKey:"",                   // Anthropic key (master sets; stored locally only)
  sync:{ enabled:false, url:"", secret:"", lastPull:0 },
  tombstones:[],               // [{coll,id,ts}] deletion markers for cross-device merge
  metaTs:{ presenceScore:0, finance:0 },
  welcomed:false,              // first-run welcome shown (local UI pref)
  hideChecklist:false,         // getting-started checklist dismissed (local UI pref)
  jobPhotos:{},                // { jobId: [dataURL,...] } — LOCAL ONLY, never synced (keeps payload small)
  fields:{}
};
const SYNCED=["leads","customers","reviewRequests","reputation","developments","jobs","inventory","staff","contracts"];
let STATE = null;

/* ---- persistence + migration ---- */
function deepMerge(base, over){
  if(Array.isArray(base)) return Array.isArray(over)? over : base;
  if(base && typeof base==="object"){
    const out = Array.isArray(base)? [] : {...base};
    for(const k in over){
      if(over[k] && typeof over[k]==="object" && !Array.isArray(over[k]) && base[k] && typeof base[k]==="object")
        out[k]=deepMerge(base[k],over[k]);
      else out[k]=over[k];
    }
    return out;
  }
  return over===undefined? base : over;
}
function loadState(){
  try{
    const saved = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
    STATE = saved ? deepMerge(JSON.parse(JSON.stringify(FRESH_STATE)), saved)
                  : JSON.parse(JSON.stringify(FRESH_STATE));
  }catch(e){ STATE = JSON.parse(JSON.stringify(FRESH_STATE)); }
}
function saveStateLocal(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(STATE)); }catch(e){ toast("Storage full — export a backup"); } }
function saveState(){ saveStateLocal(); scheduleSync(); }
window.addEventListener("visibilitychange", ()=>{ if(document.hidden){ saveStateLocal(); if(syncEnabled()) syncPushNow(); } });
window.addEventListener("pagehide", ()=>{ saveStateLocal(); });

/* =========================================================
   CROSS-DEVICE SYNC (Cloudflare Worker + D1)
   Record-level last-write-wins. Debounced push on save (never on keystroke).
   ========================================================= */
function syncEnabled(){ return !!(STATE.sync && STATE.sync.enabled && STATE.sync.url && STATE.sync.secret); }
function syncUrl(){ return (STATE.sync.url||"").replace(/\/+$/,""); }
// create or update a record in a synced collection, stamping _ts for merge
function upsert(coll, rec, id){
  rec._ts=Date.now();
  if(id){ const i=STATE[coll].findIndex(x=>x.id===id); if(i>=0){ STATE[coll][i]={...STATE[coll][i],...rec}; return STATE[coll][i]; } }
  if(!rec.id) rec.id=uid();
  if(!rec.createdAt) rec.createdAt=nowISO();
  STATE[coll].unshift(rec); return rec;
}
// stamp an in-place mutation so it wins on merge
function touch(rec){ if(rec) rec._ts=Date.now(); }
// delete with a tombstone so the deletion propagates across devices
function softDelete(coll,id){
  STATE[coll]=STATE[coll].filter(x=>x.id!==id);
  STATE.tombstones.push({coll,id,ts:Date.now()});
  if(STATE.tombstones.length>800) STATE.tombstones=STATE.tombstones.slice(-800);
}
function mergeRecords(localArr, remoteArr, tomb){
  const map={}; (localArr||[]).forEach(r=>{ if(r&&r.id) map[r.id]=r; });
  (remoteArr||[]).forEach(r=>{ if(!r||!r.id) return; const cur=map[r.id]; if(!cur || (r._ts||0)>(cur._ts||0)) map[r.id]=r; });
  let out=Object.keys(map).map(k=>map[k]);
  if(tomb&&tomb.length) out=out.filter(r=>!tomb.some(t=>t.id===r.id && (t.ts||0)>=(r._ts||0)));
  return out;
}
function mergeState(remote){
  if(!remote) return;
  const allTomb=[...(STATE.tombstones||[]),...(remote.tombstones||[])];
  SYNCED.forEach(coll=>{ STATE[coll]=mergeRecords(STATE[coll], remote[coll], allTomb.filter(t=>t.coll===coll)); });
  const tmap={}; allTomb.forEach(t=>{ const k=t.coll+"|"+t.id; if(!tmap[k]||t.ts>tmap[k].ts) tmap[k]=t; });
  STATE.tombstones=Object.keys(tmap).map(k=>tmap[k]).slice(-800);
  ["presenceScore","finance"].forEach(k=>{
    const rTs=(remote.metaTs&&remote.metaTs[k])||0, lTs=(STATE.metaTs&&STATE.metaTs[k])||0;
    if(rTs>lTs && remote[k]){ STATE[k]=remote[k]; STATE.metaTs[k]=rTs; }
  });
}
function syncPayload(){
  const p={tombstones:STATE.tombstones||[], metaTs:STATE.metaTs||{}, presenceScore:STATE.presenceScore, finance:STATE.finance};
  SYNCED.forEach(c=>p[c]=STATE[c]);
  return p;
}
async function syncPull(){
  if(!syncEnabled()) return false;
  try{
    const r=await fetch(syncUrl()+"/state",{headers:{"X-AMG-Secret":STATE.sync.secret}});
    if(!r.ok) return false;
    const d=await r.json();
    if(d && d.data){ mergeState(d.data); STATE.sync.lastPull=d.serverTs||Date.now(); saveStateLocal(); if(document.getElementById("app").style.display!=="none") render(); }
    return true;
  }catch(e){ return false; }
}
async function syncPushNow(){
  if(!syncEnabled()) return false;
  try{
    await syncPull(); // pull-merge first to avoid clobbering another device
    const r=await fetch(syncUrl()+"/state",{method:"POST",
      headers:{"Content-Type":"application/json","X-AMG-Secret":STATE.sync.secret},
      body:JSON.stringify({data:syncPayload()})});
    return r.ok;
  }catch(e){ return false; }
}
let _syncTimer=null;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function nowISO(){ return new Date().toISOString(); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtMoney(n){ n=Number(n)||0; return "$"+n.toLocaleString(); }
function fmtDate(d){ if(!d) return ""; const x=new Date(d); if(isNaN(x)) return d; return x.toLocaleDateString("en-CA",{month:"short",day:"numeric"}); }
function daysUntil(d){ if(!d) return null; return Math.ceil((new Date(d)-new Date(today()))/86400000); }

/* tiny salted hash for PIN (local gate only) */
function hashPin(pin, salt){
  let h=5381; const s=salt+"|"+pin;
  for(let i=0;i<s.length;i++){ h=((h<<5)+h)+s.charCodeAt(i); h|=0; }
  return String(h>>>0);
}
function newSalt(){ return Math.random().toString(36).slice(2,10); }

function createMaster(){
  const name=val("suName").trim(), role=val("suRole").trim()||"Owner", pin=val("suPin").trim();
  if(!name) return setErr("suErr","Enter your name");
  if(pin.length<4) return setErr("suErr","PIN must be at least 4 digits");
  const salt=newSalt();
  STATE.accounts[name]={salt,hash:hashPin(pin,salt),role,master:true};
  STATE.masterUser=name; saveState();
  doSignIn(name);
}

  const body=document.getElementById("authBody");

  const a=STATE.accounts[name], pin=val("piPin").trim();

let devFilter={stage:""};
function viewDevelopments(){

  const bids=STATE.developments.filter(d=>d.bidDueDate&&daysUntil(d.bidDueDate)!=null&&daysUntil(d.bidDueDate)<=14&&!["Won","Lost"].includes(d.stage));
  if(bids.length){
    html+=`<div class="section-h"><h2>📅 Bids due soon</h2></div>`;
    html+=bids.sort((a,b)=>a.bidDueDate>b.bidDueDate?1:-1).map(d=>`<div class="list-item" onclick="editDev('${d.id}')">

      <div class="rt" style="color:${daysUntil(d.bidDueDate)<=3?"var(--red)":"var(--warn)"}">${daysUntil(d.bidDueDate)}d</div></div>`).join("");
  }
  html+=`<div class="toolbar"><select onchange="devFilter.stage=this.value;render()"><option value="">All stages</option>${DEV_STAGES.map(s=>`<option ${devFilter.stage===s?"selected":""}>${s}</option>`).join("")}</select></div>`;
  let list=all; if(devFilter.stage) list=list.filter(d=>d.stage===devFilter.stage);
  html+=`<div class="board">`;
  DEV_STAGES.forEach(st=>{
    const items=list.filter(d=>d.stage===st);
    const v=items.reduce((s,d)=>s+(Number(d.estValue)||0),0);
    html+=`<div class="col"><h3>${st}<span class="ct">${items.length}</span></h3>`;

let schedFilter={status:""};
function viewSchedule(){
  const all=brandFilter(STATE.jobs);
  let html=`<div class="page-title">Schedule & Dispatch</div>
    <div class="page-sub">${all.length} job${all.length!==1?"s":""} · ${brandLabel()}</div>`;
  html+=`<div class="toolbar"><select onchange="schedFilter.status=this.value;render()"><option value="">All statuses</option>${JOB_STATUS.map(s=>`<option ${schedFilter.status===s?"selected":""}>${s}</option>`).join("")}</select></div>`;
  let list=all.slice().sort((a,b)=>((a.date||"")+(a.time||"")>(b.date||"")+(b.time||"")?1:-1));
  if(schedFilter.status) list=list.filter(j=>j.status===schedFilter.status);
  if(!list.length) return html+emptyCard("No jobs scheduled. Tap + to add one.");
  const groups={}; list.forEach(j=>{ const k=j.date||"No date"; (groups[k]=groups[k]||[]).push(j); });
  Object.keys(groups).sort().forEach(date=>{
    const lbl = date===today()?"Today":date==="No date"?"No date":new Date(date).toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"});
    html+=`<div class="section-h"><h2>${esc(lbl)}</h2><div class="spacer"></div><span class="note">${groups[date].length}</span></div>`;
    html+=groups[date].map(j=>jobRow(j)).join("");
  });
  return html;

  const x={customer:val("j_cust").trim(),brand:val("j_brand"),type:val("j_type"),date:val("j_date"),time:val("j_time"),

function delJobFull(id){ if(STATE.jobPhotos[id]){ delete STATE.jobPhotos[id]; } delRec("jobs",id); }
function addJobPhoto(id,ev){
  const f=ev.target.files&&ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image(); img.onload=()=>{
    const max=700; let w=img.width,h=img.height; if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
    const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
    STATE.jobPhotos[id]=STATE.jobPhotos[id]||[]; STATE.jobPhotos[id].push(c.toDataURL("image/jpeg",0.6));
    saveStateLocal(); editJob(id); toast("Photo saved (this device)");
  }; img.src=rd.result; };
  rd.readAsDataURL(f);
}
function delJobPhoto(id,i){ if(STATE.jobPhotos[id]){ STATE.jobPhotos[id].splice(i,1); saveStateLocal(); editJob(id); } }
function bumpCustomerLTV(name){
  if(!name) return; const c=STATE.customers.find(x=>x.customer===name); if(!c) return;
  const jobs=STATE.jobs.filter(j=>j.customer===name);
  c.lifetimeValue=jobs.reduce((s,j)=>s+(Number(j.invoice||j.value)||0),0);
  const last=jobs.map(j=>j.date).filter(Boolean).sort().pop(); if(last) c.lastJobDate=last;
  touch(c);

function viewFinance(){
  if(!isMaster()) return `<div class="page-title">Owner / Finance</div><div class="card"><div class="empty">🔒 This view is restricted to the master (owner) account.</div></div>`;
  const f=STATE.finance;
  const openLeads=STATE.leads.filter(l=>!["Won","Lost"].includes(l.stage));
  const pipe=openLeads.reduce((s,l)=>s+(Number(l.value)||0),0);
  const wonRev=STATE.leads.filter(l=>l.stage==="Won").reduce((s,l)=>s+(Number(l.value)||0),0);
  const arr=STATE.contracts.filter(c=>c.status==="Active").reduce((s,c)=>s+(Number(c.annualValue)||0),0);
  const devPipe=STATE.developments.filter(d=>!["Won","Lost"].includes(d.stage)).reduce((s,d)=>s+(Number(d.estValue)||0),0);
  const jobsComplete=STATE.jobs.filter(j=>j.status==="Complete");
  const jobsRev=jobsComplete.reduce((s,j)=>s+(Number(j.value)||0),0);
  const conv=STATE.leads.length?Math.round(STATE.leads.filter(l=>["Booked","Won"].includes(l.stage)).length/STATE.leads.length*100):0;
  const unpaidJobs=STATE.jobs.filter(j=>j.paid==="Unpaid");
  const unpaid=unpaidJobs.reduce((s,j)=>s+(Number(j.invoice||j.value)||0),0);
  const rev=Number(f.monthRevenue)||0, tgt=Number(f.monthTarget)||0, exp=Number(f.monthExpenses)||0;
  const tgtPct=tgt?Math.min(100,Math.round(rev/tgt*100)):0;
  let html=`<div class="page-title">Owner / Finance</div><div class="page-sub">Master view · live across all modules</div>`;
  html+=`<div class="grid g2">
    ${kpi("Open pipeline",fmtMoney(pipe),openLeads.length+" leads",true)}
    ${kpi("Unpaid invoices",fmtMoney(unpaid),unpaidJobs.length+" job"+(unpaidJobs.length!==1?"s":""))}
    ${kpi("Recurring ARR",fmtMoney(arr),"active contracts")}
    ${kpi("Dev pipeline",fmtMoney(devPipe),"potential")}
    ${kpi("Completed jobs",jobsComplete.length,fmtMoney(jobsRev))}
    ${kpi("Lead conversion",conv+"%","booked / total")}
  </div>`;
  if(unpaidJobs.length){
    html+=`<div class="section-h"><h2>💸 Unpaid jobs</h2><div class="spacer"></div><button class="btn sm sec" onclick="go('schedule')">Schedule</button></div>`;
    html+=unpaidJobs.slice(0,6).map(j=>jobRow(j)).join("");
  }
  html+=`<div class="section-h"><h2>This month</h2><div class="spacer"></div><button class="btn sm sec" onclick="editFinance()">Edit</button></div>`;
  html+=`<div class="card"><div class="row"><div style="flex:1"><div class="note">Revenue vs target</div>
    <div style="font-size:24px;font-weight:800">${fmtMoney(rev)} <span class="note">/ ${fmtMoney(tgt)}</span></div></div></div>
    <div class="progress" style="margin-top:8px"><i style="width:${tgtPct}%"></i></div>
    <div class="grid g3" style="margin-top:14px">
      ${kpi("Expenses",fmtMoney(exp),"this month")}
      ${kpi("Est. profit",fmtMoney(rev-exp),rev-exp>=0?"positive":"negative")}
      ${kpi("Avg job value",f.avgJobValue?fmtMoney(f.avgJobValue):"—","target +25% upsell")}
    </div></div>`;
  html+=`<div class="note" style="margin-top:14px">KPI targets reference §10 of your strategy report. Update presence ratings under Customers → Scoreboard.</div>`;
  return html;

function aiPanel(text,enhancing){
  const out=document.getElementById("aiOut"); if(!out) return;
  out.innerHTML=`<div class="ai-box">${esc(text)}</div>
    <div class="row" style="margin-top:8px;gap:8px">
      <button class="btn sm sec" onclick="copyAI()">Copy</button>
      ${enhancing?'<span class="note">✨ enhancing with AI…</span>':""}
    </div>`;
  out._text=text;
}
function copyAI(){ const out=document.getElementById("aiOut"); if(out&&out._text){ navigator.clipboard&&navigator.clipboard.writeText(out._text); toast("Copied"); } }
async function runAI(prompt, template){
  aiPanel(template, !!STATE.apiKey);
  if(!STATE.apiKey) return;
  try{
    const r=await callHaiku(prompt);
    aiPanel(r,false);
  }catch(e){ /* keep template */ aiPanel(template,false); }
}
async function callHaiku(prompt){
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":STATE.apiKey,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,messages:[{role:"user",content:prompt}]})
  });
  const data=await resp.json();
  if(data.content&&data.content[0]) return data.content[0].text;
  throw new Error("no content");
}

function exportData(){
  const blob=new Blob([JSON.stringify(STATE,null,2)],{type:"application/json"});

  a.download="amg-cc-backup-"+today()+".json"; a.click(); toast("Backup exported");

function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const data=JSON.parse(rd.result);
    if(!confirm("Import will merge backup data into this device. Continue?")) return;
    STATE=deepMerge(JSON.parse(JSON.stringify(FRESH_STATE)),data); saveState(); render(); toast("Backup imported");
  }catch(e){ toast("Invalid backup file"); } };
  rd.readAsText(f);
}

    <button class="btn ghost" style="margin-top:10px" onclick="STATE.welcomed=true;saveState();closeModal()">Start empty</button>`);
}

/* =========================================================
   Form field builders + modal
   ========================================================= */
function F(label,id,v,type){ return `<div class="field"><label>${esc(label)}</label><input id="${id}" type="${type||"text"}" value="${esc(v==null?"":v)}"></div>`; }
function T(label,id,v){ return `<div class="field"><label>${esc(label)}</label><textarea id="${id}" rows="3">${esc(v==null?"":v)}</textarea></div>`; }
function S(label,id,opts,sel){ return `<div class="field"><label>${esc(label)}</label><select id="${id}">${opts.map(o=>`<option value="${esc(o)}" ${String(sel)===String(o)?"selected":""}>${esc(o===""?"—":o)}</option>`).join("")}</select></div>`; }
function emptyCard(m){ return `<div class="card"><div class="empty">${esc(m)}</div></div>`; }
function openModal(html){
  document.getElementById("modalRoot").innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="grab"></div>${html}</div></div>`;
}
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }

/* =========================================================
   BOOT
   ========================================================= */
loadState();
if(STATE.me && STATE.me.name && STATE.accounts[STATE.me.name]){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").style.display="flex";
  document.getElementById("nav").style.display="flex";
  setBrand(STATE.brand||"ALL");
  go("dashboard");
  if(syncEnabled()) syncPull();
  if(!STATE.welcomed) setTimeout(showWelcome,350);
} else {
  renderAuth();
}
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
